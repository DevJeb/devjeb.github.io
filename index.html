<!DOCTYPE html>
<html>
<head>
  <title>Display GitHub content</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <div id="github-content"></div>
  <script>
    $.ajax({
  url: 'https://raw.githubusercontent.com/DevJeb/hashing/main/info.txt',
  success: function(data) {
    $('#file-content').text(data);
  },
  error: function() {
    $('#file-content').text('Error: File not found.');
  }
});
  </script>
  <div id="file-content"></div>
</body>
</html>
